<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 반 레포 활동지 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --mint: #a8e6cf; --peach: #ffb7b2; --lavender: #c9b8f5; --lemon: #fff1a8;
    --sky: #b8e0ff; --coral: #ff8b8b; --text: #2d3748;
    --card-bg: rgba(255,255,255,0.9); --shadow: 0 8px 32px rgba(100,100,180,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: linear-gradient(135deg, #e0f4ff 0%, #f3e8ff 40%, #fff3e8 100%);
    min-height: 100vh; color: var(--text); padding-bottom: 50px;
  }

  .container { max-width: 600px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

  /* Header */
  .header {
    text-align: center; padding: 25px; background: var(--card-bg);
    border-radius: 24px; box-shadow: var(--shadow); margin-bottom: 20px;
    border: 2px solid white;
  }
  .header h1 { font-family: 'Gaegu', cursive; font-size: 2.2rem; color: #5c3d99; margin-bottom: 5px; }

  /* Tabs */
  .tab-bar { display: flex; gap: 5px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
  .tab-btn {
    flex: 1; padding: 12px 8px; border-radius: 15px; border: none;
    background: white; font-weight: 700; font-size: 0.85rem; cursor: pointer;
    color: #888; transition: 0.2s; white-space: nowrap;
  }
  .tab-btn.active { background: #a78bfa; color: white; box-shadow: 0 4px 10px rgba(167,139,250,0.4); }

  /* Cards */
  .card {
    background: var(--card-bg); border-radius: 24px; padding: 25px;
    box-shadow: var(--shadow); border: 2px solid white; display: none;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Inputs & Buttons */
  input[type="text"], input[type="password"] {
    width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #eee;
    margin-bottom: 12px; outline: none; font-size: 1rem;
  }
  .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
  .btn-main { background: #818cf8; color: white; width: 100%; font-size: 1rem; margin-top: 10px; }
  .btn-outline { background: white; border: 2px solid #eee; color: #666; }
  .btn-outline.selected { background: #ffb7b2; border-color: #ff8b8b; color: #d00; }

  /* Board Grid */
  .board-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
  .student-card {
    background: white; padding: 18px; border-radius: 18px; text-align: center;
    border: 2px solid #f0f0f0; cursor: pointer; transition: 0.2s;
  }
  .student-card:hover { transform: scale(1.03); border-color: var(--lavender); }

  /* Quiz Player (친구 퀴즈 푸는 화면) */
  #quizPlayer {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255,255,255,0.98); z-index: 1000; display: none;
    flex-direction: column; align-items: center; justify-content: center; padding: 20px;
  }
  .quiz-box {
    width: 100%; max-width: 450px; background: white; padding: 30px;
    border-radius: 30px; box-shadow: var(--shadow); text-align: center;
    border: 3px solid var(--lavender);
  }
  .quiz-option {
    width: 100%; padding: 15px; margin: 8px 0; border-radius: 15px;
    border: 2px solid #eee; background: #f9f9f9; cursor: pointer; font-size: 1rem; font-weight: 700;
  }
  .quiz-option:hover { background: #f0edff; border-color: var(--lavender); }

  /* Admin List */
  .admin-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem;
  }
  .del-btn { color: #ff4d4d; cursor: pointer; font-weight: 800; border: 1px solid #ff4d4d; padding: 2px 8px; border-radius: 5px; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #333; color: white; padding: 10px 20px; border-radius: 20px;
    display: none; z-index: 2000;
  }
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>우리 반 레포 활동지 ✨</h1>
    <p style="font-size: 0.9rem; color: #888;">친구들과 즐겁게 소통해요!</p>
  </div>

  <div class="card" id="nameSection" style="display: block; margin-bottom: 20px;">
    <p style="font-weight: 800; margin-bottom: 10px;">👋 안녕! 네 이름을 알려줘</p>
    <div style="display: flex; gap: 8px;">
      <input type="text" id="userName" placeholder="예: 홍길동" style="margin-bottom: 0;">
      <button class="btn btn-main" onclick="saveName()" style="width: 80px; margin-top: 0;">확인</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(0)">🃏 퀴즈 만들기</button>
    <button class="tab-btn" onclick="switchTab(1)">🔥 우리 반 보드</button>
    <button class="tab-btn" onclick="switchTab(2)">⚙️ 관리</button>
  </div>

  <div class="card" id="tab0" style="display: block;">
    <h3 style="margin-bottom: 15px; color: #5c3d99;">🃏 나만의 퀴즈 출제하기</h3>
    <p style="font-size: 0.8rem; color: #888; margin-bottom: 15px;">진실 2개와 거짓 1개를 적어주세요!</p>
    
    <input type="text" id="q1" placeholder="첫 번째 문장">
    <input type="text" id="q2" placeholder="두 번째 문장">
    <input type="text" id="q3" placeholder="세 번째 문장">
    
    <p style="font-weight: 700; font-size: 0.85rem; color: #e05c7a; margin: 10px 0;">거짓말은 몇 번인가요?</p>
    <div style="display: flex; gap: 8px; margin-bottom: 15px;">
      <button class="btn btn-outline lie-sel" onclick="setLie(1)">1번</button>
      <button class="btn btn-outline lie-sel" onclick="setLie(2)">2번</button>
      <button class="btn btn-outline lie-sel" onclick="setLie(3)">3번</button>
    </div>
    
    <button class="btn btn-main" onclick="uploadQuiz()" style="background: var(--coral);">🚀 보드에 내 퀴즈 올리기</button>
  </div>

  <div class="card" id="tab1">
    <h3 style="margin-bottom: 5px;">🔥 우리 반 게시판</h3>
    <p style="font-size: 0.8rem; color: #888; margin-bottom: 15px;">친구 이름을 눌러서 퀴즈를 맞춰보세요!</p>
    <div class="board-grid" id="boardList">
      </div>
  </div>

  <div class="card" id="tab2">
    <h3>⚙️ 데이터 관리 (교사용)</h3>
    <div id="adminAuth">
      <p style="margin: 15px 0 10px; font-size: 0.9rem;">비밀번호를 입력하세요.</p>
      <input type="password" id="adminPw" placeholder="비밀번호 4자리">
      <button class="btn btn-main" onclick="checkAdmin()">로그인</button>
    </div>
    <div id="adminPanel" style="display: none;">
      <button class="btn btn-main" onclick="resetAllData()" style="background: #ff4d4d; margin-bottom: 20px;">💣 전체 데이터 초기화</button>
      <p style="font-weight: 800; font-size: 0.9rem; margin-bottom: 10px;">학생 개별 관리</p>
      <div id="adminList"></div>
    </div>
  </div>
</div>

<div id="quizPlayer">
  <div class="quiz-box">
    <h2 id="targetName" style="color: #5c3d99; margin-bottom: 20px;">ㅇㅇㅇ의 퀴즈</h2>
    <p style="font-size: 0.9rem; color: #666; margin-bottom: 20px;">이 중 <b>거짓말</b>은 무엇일까요?</p>
    
    <button class="quiz-option" id="opt1" onclick="submitAnswer(1)"></button>
    <button class="quiz-option" id="opt2" onclick="submitAnswer(2)"></button>
    <button class="quiz-option" id="opt3" onclick="submitAnswer(3)"></button>
    
    <div id="solveResult" style="margin-top: 20px; font-weight: 800; font-size: 1.2rem; display: none;"></div>
    <button class="btn btn-outline" onclick="closeQuiz()" style="margin-top: 25px; width: 100%;">닫기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Firebase 초기화 (제공해주신 키 사용)
firebase.initializeApp({
  apiKey: 'AIzaSyDhZbmZ64vroTb7dTWBHNmAgvADUT8ZHtQ',
  projectId: 'whoami-fd9d4',
  databaseURL: 'https://whoami-fd9d4-default-rtdb.asia-southeast1.firebasedatabase.app'
});
const db = firebase.database();
const CLASS_REF = db.ref('classes/6학년1반/students');

let myName = '';
let selectedLie = 0;
let students = {};
let currentQuizAns = 0;

// 초기 로드
window.onload = () => {
  const saved = localStorage.getItem('school_name');
  if(saved) {
    myName = saved;
    document.getElementById('userName').value = saved;
    document.getElementById('nameSection').style.border = '2px solid #818cf8';
  }
  listenData();
};

function saveName() {
  const val = document.getElementById('userName').value.trim();
  if(!val) return alert('이름을 입력해줘!');
  myName = val;
  localStorage.setItem('school_name', val);
  showToast('이름이 저장되었습니다! 😊');
}

function setLie(n) {
  selectedLie = n;
  document.querySelectorAll('.lie-sel').forEach((b, i) => {
    b.classList.toggle('selected', i + 1 === n);
  });
}

// 퀴즈 업로드
function uploadQuiz() {
  if(!myName) return alert('먼저 이름을 입력하고 확인을 눌러줘!');
  const q1 = document.getElementById('q1').value.trim();
  const q2 = document.getElementById('q2').value.trim();
  const q3 = document.getElementById('q3').value.trim();
  
  if(!q1 || !q2 || !q3 || selectedLie === 0) return alert('모든 문장을 적고 정답을 골라줘!');

  CLASS_REF.child(myName).set({
    name: myName,
    q1, q2, q3,
    ans: selectedLie,
    ts: Date.now()
  }).then(() => {
    showToast('보드에 퀴즈를 올렸어! 🔥');
    switchTab(1);
  });
}

// 데이터 감시 및 보드 업데이트
function listenData() {
  CLASS_REF.on('value', (snapshot) => {
    students = snapshot.val() || {};
    updateBoard();
    updateAdminList();
  });
}

function updateBoard() {
  const list = document.getElementById('boardList');
  list.innerHTML = '';
  Object.keys(students).forEach(name => {
    const div = document.createElement('div');
    div.className = 'student-card';
    div.innerHTML = `<div style="font-size:1.2rem; margin-bottom:5px;">🙋‍♂️</div><div style="font-weight:800;">${name}</div>`;
    div.onclick = () => openQuiz(name);
    list.appendChild(div);
  });
}

// 퀴즈 풀기 시작
function openQuiz(name) {
  const data = students[name];
  currentQuizAns = data.ans;
  
  document.getElementById('targetName').textContent = `${name}의 퀴즈`;
  document.getElementById('opt1').textContent = `1. ${data.q1}`;
  document.getElementById('opt2').textContent = `2. ${data.q2}`;
  document.getElementById('opt3').textContent = `3. ${data.q3}`;
  
  document.getElementById('solveResult').style.display = 'none';
  document.getElementById('quizPlayer').style.display = 'flex';
}

function submitAnswer(n) {
  const res = document.getElementById('solveResult');
  res.style.display = 'block';
  if(n === currentQuizAns) {
    res.innerHTML = "🎉 정답! 진짜를 찾아냈어!";
    res.style.color = "#059669";
  } else {
    res.innerHTML = `❌ 틀렸어! 정답은 ${currentQuizAns}번이야.`;
    res.style.color = "#dc2626";
  }
}

function closeQuiz() {
  document.getElementById('quizPlayer').style.display = 'none';
}

// 교사 관리 기능
function checkAdmin() {
  const pw = document.getElementById('adminPw').value;
  if(pw === '6956') {
    document.getElementById('adminAuth').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
  } else {
    alert('비밀번호가 틀렸습니다.');
  }
}

function updateAdminList() {
  const list = document.getElementById('adminList');
  list.innerHTML = '';
  Object.keys(students).forEach(name => {
    const row = document.createElement('div');
    row.className = 'admin-item';
    row.innerHTML = `<span>${name} 학생</span> <span class="del-btn" onclick="deleteStudent('${name}')">삭제</span>`;
    list.appendChild(row);
  });
}

function deleteStudent(name) {
  if(confirm(`${name} 학생의 데이터를 삭제할까요?`)) {
    CLASS_REF.child(name).remove();
  }
}

function resetAllData() {
  if(confirm('정말 우리 반 모든 데이터를 초기화할까요? 되돌릴 수 없습니다.')) {
    CLASS_REF.remove().then(() => alert('초기화 완료!'));
  }
}

// 기타 유틸
function switchTab(n) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === n));
  document.querySelectorAll('.card').forEach((c, i) => {
    if(i > 0) c.style.display = (i-1 === n) ? 'block' : 'none';
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}
</script>
</body>
</html>
