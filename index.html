<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 반 레포 활동지 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --mint: #a8e6cf; --peach: #ffb7b2; --lavender: #c9b8f5; --lemon: #fff1a8;
    --sky: #b8e0ff; --coral: #ff8b8b; --text: #2d3748;
    --card-bg: rgba(255,255,255,0.9); --shadow: 0 8px 32px rgba(100,100,180,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: linear-gradient(135deg, #e0f4ff 0%, #f3e8ff 40%, #fff3e8 100%);
    min-height: 100vh; color: var(--text); padding-bottom: 50px;
  }

  .container { max-width: 600px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

  /* Header & Score display */
  .header {
    text-align: center; padding: 20px; background: var(--card-bg);
    border-radius: 24px; box-shadow: var(--shadow); margin-bottom: 20px; border: 2px solid white;
  }
  .header h1 { font-family: 'Gaegu', cursive; font-size: 2rem; color: #5c3d99; }
  .user-score-badge {
    display: inline-block; margin-top: 10px; padding: 5px 15px; background: #818cf8;
    color: white; border-radius: 20px; font-weight: 800; font-size: 0.9rem;
  }

  /* Tabs */
  .tab-bar { display: flex; gap: 5px; margin-bottom: 20px; }
  .tab-btn {
    flex: 1; padding: 12px 5px; border-radius: 15px; border: none;
    background: white; font-weight: 700; font-size: 0.8rem; cursor: pointer;
    color: #888; transition: 0.2s;
  }
  .tab-btn.active { background: #a78bfa; color: white; }

  /* Cards */
  .card {
    background: var(--card-bg); border-radius: 24px; padding: 25px;
    box-shadow: var(--shadow); border: 2px solid white; display: none;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  input[type="text"], input[type="password"] {
    width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #eee;
    margin-bottom: 12px; outline: none; font-size: 1rem;
  }
  .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
  .btn-main { background: #818cf8; color: white; width: 100%; font-size: 1rem; margin-top: 10px; }
  .btn-outline { background: white; border: 2px solid #eee; color: #666; }
  .btn-outline.selected { background: #ffb7b2; border-color: #ff8b8b; color: #d00; }

  /* Board Grid */
  .board-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
  .student-card {
    background: white; padding: 15px; border-radius: 18px; text-align: center;
    border: 2px solid #f0f0f0; cursor: pointer; transition: 0.2s;
  }
  .student-card:hover { transform: scale(1.03); }
  .student-score { font-size: 0.75rem; color: #818cf8; font-weight: 800; margin-top: 5px; }

  /* Quiz Player Fullscreen */
  #quizPlayer {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(240, 244, 255, 0.98); z-index: 1000; display: none;
    flex-direction: column; align-items: center; justify-content: center; padding: 20px;
  }
  .quiz-box {
    width: 100%; max-width: 450px; background: white; padding: 30px;
    border-radius: 30px; box-shadow: var(--shadow); text-align: center;
    border: 3px solid var(--lavender);
  }
  .quiz-option {
    width: 100%; padding: 15px; margin: 8px 0; border-radius: 15px;
    border: 2px solid #eee; background: #f9f9f9; cursor: pointer; font-size: 1rem; font-weight: 700;
  }

  /* Admin List */
  .admin-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px; border-bottom: 1px solid #eee; font-size: 0.85rem;
  }

  .toast {
    position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
    background: #333; color: white; padding: 12px 25px; border-radius: 30px;
    display: none; z-index: 3000; font-weight: 700;
  }
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>우리 반 레포 활동지 ✨</h1>
    <div class="user-score-badge">내 점수: <span id="myScoreDisp">0</span>점</div>
  </div>

  <div class="card" id="nameSection" style="display: block; margin-bottom: 20px;">
    <p style="font-weight: 800; margin-bottom: 10px;">👋 안녕! 네 이름을 알려줘</p>
    <div style="display: flex; gap: 8px;">
      <input type="text" id="userName" placeholder="예: 홍길동" style="margin-bottom: 0;">
      <button class="btn btn-main" onclick="saveName()" style="width: 80px; margin-top: 0;">확인</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(0)">🃏 퀴즈 만들기</button>
    <button class="tab-btn" onclick="switchTab(1)">🔥 우리 반 보드</button>
    <button class="tab-btn" onclick="switchTab(2)">⚙️ 관리</button>
  </div>

  <div class="card" id="tab0" style="display: block;">
    <h3 style="margin-bottom: 15px; color: #5c3d99;">🃏 나만의 퀴즈 출제하기</h3>
    <input type="text" id="q1" placeholder="진실 혹은 거짓 문장 1">
    <input type="text" id="q2" placeholder="진실 혹은 거짓 문장 2">
    <input type="text" id="q3" placeholder="진실 혹은 거짓 문장 3">
    <p style="font-weight: 700; font-size: 0.85rem; color: #e05c7a; margin: 10px 0;">거짓말은 몇 번인가요?</p>
    <div style="display: flex; gap: 8px; margin-bottom: 15px;">
      <button class="btn btn-outline lie-sel" onclick="setLie(1)">1번</button>
      <button class="btn btn-outline lie-sel" onclick="setLie(2)">2번</button>
      <button class="btn btn-outline lie-sel" onclick="setLie(3)">3번</button>
    </div>
    <button class="btn btn-main" onclick="uploadQuiz()" style="background: var(--coral);">🚀 보드에 내 퀴즈 올리기</button>
  </div>

  <div class="card" id="tab1">
    <h3 style="margin-bottom: 15px;">🔥 우리 반 게시판</h3>
    <div class="board-grid" id="boardList"></div>
  </div>

  <div class="card" id="tab2">
    <h3>⚙️ 교사용 관리 모드</h3>
    <div id="adminAuth">
      <p style="margin: 15px 0 10px; font-size: 0.9rem;">비밀번호를 입력하세요.</p>
      <input type="password" id="adminPw" placeholder="비밀번호 4자리">
      <button class="btn btn-main" onclick="checkAdmin()">로그인</button>
    </div>
    <div id="adminPanel" style="display: none;">
      <button class="btn btn-main" onclick="resetAllScores()" style="background: #818cf8; margin-bottom: 10px;">✨ 전체 점수 초기화</button>
      <button class="btn btn-main" onclick="resetAllData()" style="background: #ff4d4d; margin-bottom: 20px;">💣 전체 데이터 삭제</button>
      <div id="adminList"></div>
    </div>
  </div>
</div>

<div id="quizPlayer">
  <div class="quiz-box">
    <h2 id="targetName" style="color: #5c3d99; margin-bottom: 15px;"></h2>
    <p style="font-size: 0.9rem; color: #888; margin-bottom: 20px;">거짓말 문장을 찾아보세요!</p>
    <button class="quiz-option" id="opt1" onclick="submitAnswer(1)"></button>
    <button class="quiz-option" id="opt2" onclick="submitAnswer(2)"></button>
    <button class="quiz-option" id="opt3" onclick="submitAnswer(3)"></button>
    <button class="btn btn-outline" onclick="closeQuiz()" style="margin-top: 20px; width: 100%;">그만 풀기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Firebase 초기화
firebase.initializeApp({
  apiKey: 'AIzaSyDhZbmZ64vroTb7dTWBHNmAgvADUT8ZHtQ',
  projectId: 'whoami-fd9d4',
  databaseURL: 'https://whoami-fd9d4-default-rtdb.asia-southeast1.firebasedatabase.app'
});
const db = firebase.database();
const CLASS_REF = db.ref('classes/6학년1반/students');

let myName = '';
let selectedLie = 0;
let students = {};
let currentQuizData = null;

window.onload = () => {
  const saved = localStorage.getItem('school_name');
  if(saved) { myName = saved; document.getElementById('userName').value = saved; }
  listenData();
};

function saveName() {
  const val = document.getElementById('userName').value.trim();
  if(!val) return alert('이름을 입력해줘!');
  myName = val;
  localStorage.setItem('school_name', val);
  showToast(`${val}님, 확인되었습니다!`);
}

function setLie(n) {
  selectedLie = n;
  document.querySelectorAll('.lie-sel').forEach((b, i) => b.classList.toggle('selected', i + 1 === n));
}

function uploadQuiz() {
  if(!myName) return alert('이름을 먼저 입력하고 확인을 눌러줘!');
  const qs = [document.getElementById('q1').value, document.getElementById('q2').value, document.getElementById('q3').value];
  if(qs.some(q => !q.trim()) || selectedLie === 0) return alert('모든 내용을 채워줘!');

  CLASS_REF.child(myName).update({
    name: myName, q1: qs[0], q2: qs[1], q3: qs[2], ans: selectedLie, ts: Date.now()
  }).then(() => { showToast('퀴즈가 보드에 올라갔어! 🔥'); switchTab(1); });
}

function listenData() {
  CLASS_REF.on('value', (snapshot) => {
    students = snapshot.val() || {};
    updateBoard();
    updateAdminList();
    if(myName && students[myName]) {
      document.getElementById('myScoreDisp').textContent = students[myName].score || 0;
    }
  });
}

function updateBoard() {
  const list = document.getElementById('boardList');
  list.innerHTML = '';
  Object.keys(students).forEach(name => {
    const s = students[name];
    const div = document.createElement('div');
    div.className = 'student-card';
    div.innerHTML = `<div style="font-weight:800;">🙋‍♂️ ${name}</div><div class="student-score">점수: ${s.score || 0}</div>`;
    div.onclick = () => openQuiz(name);
    list.appendChild(div);
  });
}

function openQuiz(name) {
  if(name === myName) return alert('내 문제는 내가 풀 수 없어요! 다른 친구 문제를 골라봐요.');
  const data = students[name];
  currentQuizData = data;
  
  document.getElementById('targetName').textContent = `${name}의 퀴즈`;
  document.getElementById('opt1').textContent = `1. ${data.q1}`;
  document.getElementById('opt2').textContent = `2. ${data.q2}`;
  document.getElementById('opt3').textContent = `3. ${data.q3}`;
  document.getElementById('quizPlayer').style.display = 'flex';
}

function submitAnswer(n) {
  if(n === currentQuizData.ans) {
    showToast("🎉 정답입니다! 점수 +1");
    // 점수 업데이트
    const newScore = (students[myName]?.score || 0) + 1;
    CLASS_REF.child(myName).child('score').set(newScore);
    closeQuiz();
  } else {
    alert("오답입니다! 다른 친구 문제로 넘어갑니다.");
    jumpToRandomQuiz();
  }
}

function jumpToRandomQuiz() {
  const others = Object.keys(students).filter(n => n !== myName && n !== currentQuizData.name);
  if(others.length > 0) {
    const randomName = others[Math.floor(Math.random() * others.length)];
    openQuiz(randomName);
  } else {
    alert("더 이상 풀 수 있는 다른 친구의 문제가 없어요!");
    closeQuiz();
  }
}

function closeQuiz() { document.getElementById('quizPlayer').style.display = 'none'; }

// 교사용 관리
function checkAdmin() {
  if(document.getElementById('adminPw').value === '6956') {
    document.getElementById('adminAuth').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
  } else alert('비밀번호가 틀렸습니다.');
}

function resetAllScores() {
  if(!confirm('모든 학생의 점수를 0점으로 초기화할까요?')) return;
  Object.keys(students).forEach(name => {
    CLASS_REF.child(name).child('score').set(0);
  });
  showToast('점수 초기화 완료! ✨');
}

function resetAllData() {
  if(confirm('모든 데이터를 삭제할까요?')) CLASS_REF.remove();
}

function updateAdminList() {
  const list = document.getElementById('adminList');
  list.innerHTML = '<p style="font-weight:800; margin: 10px 0;">학생 목록</p>';
  Object.keys(students).forEach(name => {
    const row = document.createElement('div');
    row.className = 'admin-item';
    row.innerHTML = `<span>${name} (${students[name].score || 0}점)</span> <button onclick="deleteStudent('${name}')" style="color:red; background:none; border:none; cursor:pointer;">[삭제]</button>`;
    list.appendChild(row);
  });
}

function deleteStudent(name) { if(confirm(`${name} 삭제?`)) CLASS_REF.child(name).remove(); }

function switchTab(n) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === n));
  document.querySelectorAll('.card').forEach((c, i) => {
    if(i > 0) c.style.display = (i-1 === n) ? 'block' : 'none';
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}
</script>
</body>
</html>
